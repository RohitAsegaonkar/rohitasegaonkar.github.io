<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <link rel="icon" href="Images/example2.png" type="image/png">
    <style>
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 0;
        }
        .background-gif {
            width: 50%;
            height: 100%;
            overflow: hidden;
        }
        .background-gif img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .content {
            width: 50%;
            color: rgb(255, 255, 255);
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-left: 20px;
        }
        .construction-text {
            font-size: min(4vw, 25px);/* Use viewport width units for responsive font size */
            font-weight: bold;
            text-align: center;
            max-width: 90%; /* Limit the width of the text */
            margin: 30px auto; /* Center the text and add margin */
        }
        .equations {
            font-size: 18px;
            font-style: italic;
            text-align: center;
            margin-top: 30px;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            width: 100%;
        }
        @media (max-width: 600px) {
            body {
                flex-direction: column;
            }
            .background-gif, .content {
                width: 100%;
            }
            .construction-text {
                font-size: 24px;
            }
            .equations {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background-gif">
        <img src="observer.gif" alt="Quantum Brain GIF">
    </div>
    <div class="content">
        <div class="construction-text">Entangling some code particles, this website is momentarily in a superposition of maintenance and creativity!</div>
        <div class="background-gif2">
            <img src="construction.gif" alt="Your First GIF" style="width: 200px;" >
        </div>
        <div>
            <img src="image.png" alt="Your Second Image" style="width: 300px; margin-top: 50px;">
            <footer style="text-align: center; margin-top: 50px; color: white; font-family: Arial, sans-serif;">    
                &copy; <script>document.write(new Date().getFullYear())</script> Rohit Asegaonkar. All rights reserved.
            </footer>
        </div>
        <div class="equations">
            <!-- Add any relevant quantum equations or symbols here -->
        </div>
    </div>
</body>
</html>
